<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <h2>Profile Page</h2>
    {% if user %}
        <p>Username: {{username}}</p>
        <p>Full Name: {{user.full_name}}</p>
    {% else %}
        <p style="color:red">User not found</p>
    {% endif %}

    <a href="{{url_for('home')}}"></a>
</body>
</html>
