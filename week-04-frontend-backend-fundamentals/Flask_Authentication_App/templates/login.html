<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>User Login</h1>
    {% if error %}
        <p style="color:red">{{error}}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Enter you username..."><br><br>
        <input type="password" name="password" placeholder="Enter you password..."><br><br>
        <button type="submit">Login</button>
    </form>

    <a href="{{url_for('register')}}">Create new account</a>
</body>
</html>
